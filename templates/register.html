<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h1>Create Account</h1>

<form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required
    ><br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    ><br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    ><br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="{{ url_for('login') }}">
Already have an account? Login
</a>

</body>
</html>
