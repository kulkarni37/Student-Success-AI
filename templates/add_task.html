<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        form{
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            width:450px;
        }

        input,select,textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#6366f1;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }
    </style>

</head>

<body>

<form method="POST">

<h2>Edit Task</h2>

<input
type="text"
name="title"
value="{{ task.title }}"
required>

<input
type="text"
name="category"
value="{{ task.category }}"
required>

<textarea
name="description">{{ task.description }}</textarea>

<input
type="date"
name="deadline"
value="{{ task.deadline }}">

<input
type="number"
name="estimated_hours"
value="{{ task.estimated_hours }}">

<select name="priority">

<option {% if task.priority=="High" %}selected{% endif %}>High</option>

<option {% if task.priority=="Medium" %}selected{% endif %}>Medium</option>

<option {% if task.priority=="Low" %}selected{% endif %}>Low</option>

</select>

<button type="submit">
Update Task
</button>

</form>

</body>
</html>
